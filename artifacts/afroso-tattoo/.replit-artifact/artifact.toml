kind = "web"
previewPath = "/"
title = "Afroso Tattoo"
version = "1.0.0"
id = "artifacts/afroso-tattoo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25228

[services.development]
run = "pnpm --filter @workspace/afroso-tattoo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/afroso-tattoo", "run", "build" ]
publicDir = "artifacts/afroso-tattoo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25228"
BASE_PATH = "/"
